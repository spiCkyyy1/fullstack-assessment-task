version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: interview_db
      POSTGRES_USER: interview
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview -d interview_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
      - /app/vendor
    environment:
      DATABASE_URL: "postgresql://interview:password@db:5432/interview_db?serverVersion=15&charset=utf8"
      APP_ENV: dev
      APP_SECRET: dev_secret_change_in_production
    depends_on:
      db:
        condition: service_healthy
    command: php -S 0.0.0.0:8000 -t /app/public

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8002
    command: npm run dev -- --host

volumes:
  postgres_data:
